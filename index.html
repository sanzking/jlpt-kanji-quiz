<!doctype html><html><head><meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>JLPT Quiz</title>
<style>
body{font-family:system-ui;background:#0f172a;color:#fff;max-width:900px;margin:auto;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:16px}
select,input,button{padding:10px;border-radius:8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{width:100%;padding:14px;margin:6px 0;background:#334155;color:#fff;border:none;cursor:pointer}
.opt:hover{background:#475569}
.good{background:#166534!important}.bad{background:#991b1b!important}
.bar{height:10px;background:#334155;border-radius:10px;overflow:hidden}
.fill{height:100%;background:#22c55e}
</style></head><body>
<h1>JLPT N5/N4 Trainer</h1>
<div class='card'>
Level <select id=l><option>ALL</option><option>N5</option><option>N4</option></select>
Mode <select id=m><option value=jp2id>JP→ID</option><option value=id2jp>ID→JP</option></select>
Session <input id=s type=number value=1 min=1>
<button onclick='start()'>Mulai</button>
<div id=info></div>
</div><br>
<div id=app></div>
<script src='data.js'></script>
<script>
let qs=[],idx=0,score=0;
const sh=a=>a.sort(()=>Math.random()-.5);
function start(){
 let lv=l.value,md=m.value,ss=(+s.value||1);
 let d=VOCAB.filter(v=>lv==='ALL'||v.level===lv);
 d=d.slice((ss-1)*25,(ss-1)*25+25);
 qs=d.map(v=>{
   let c=md==='jp2id'?v.id:v.jp;
   let pool=d.filter(x=>x!==v).map(x=>md==='jp2id'?x.id:x.jp);
   return {q:md==='jp2id'?v.jp:v.id,a:c,o:sh([c,...sh(pool).slice(0,3)])};
 });
 idx=0;score=0;render();
}
function render(){
 if(idx>=qs.length){
  app.innerHTML='<div class=card><h2>Selesai</h2><h1>'+score+'/'+qs.length+'</h1></div>';return;
 }
 let q=qs[idx];
 let pct=(idx/qs.length)*100;
 app.innerHTML=`<div class=card>
 <div>${idx+1}/${qs.length} | Score ${score}</div>
 <div class=bar><div class=fill style="width:${pct}%"></div></div>
 <h2 style="font-size:40px">${q.q}</h2>
 ${q.o.map(x=>`<button class="opt" onclick="ans(this,${JSON.stringify(x)})">${x}</button>`).join('')}
 <div id=fb></div></div>`;
}
function ans(btn,val){
 let q=qs[idx];
 document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
 if(val===q.a){btn.classList.add('good');score++;fb.innerHTML='✅ Benar';}
 else{
   btn.classList.add('bad');
   fb.innerHTML='❌ Salah<br>Jawaban: '+q.a;
 }
 setTimeout(()=>{idx++;render()},1200);
}
</script></body></html>
